<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mio Server Discord</title>
    <style>
        body {
            background-color: #313338; /* Colore sfondo Discord */
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background-color: #2b2d31;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 { margin-bottom: 10px; }
        p { color: #b5bac1; margin-bottom: 30px; }
        .btn {
            background-color: #5865f2;
            color: white;
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 5px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn:hover { background-color: #4752c4; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Benvenuti nel Server!</h1>
        <p>Il server ufficiale gestito dal mio vecchio telefono (ora su GitHub!)</p>
        <a href="https://discord.gg/Rjtm2R2T" class="btn">Entra nel Server</a>
    </div>
</body>
</html>
